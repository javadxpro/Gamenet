            direction: rtl;

        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111118;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 1px solid #222;
            z-index: 100;
        }
        .bottom-nav a {
            text-align: center;
            color: #aaa;
            text-decoration: none;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .bottom-nav a i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #ff6a00; background: #ff6a0010; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 { font-size: 1.4rem; background: linear-gradient(135deg, #fff, #ff6a00); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .back-link { color: #ff6a00; text-decoration: none; }
        .section-title {
            font-size: 1.4rem;
            margin: 1rem 0;
            border-right: 4px solid #ff6a00;
            padding-right: 0.8rem;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: #111118;
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.2s;
            cursor: pointer;
        }
        .game-card:hover {
            border-color: #ff6a00;
            transform: translateY(-5px);
        }
        .img-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
        }
        .game-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .game-info {
            padding: 1rem;
            text-align: center;
        }
        .game-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
        }
        .game-size {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        .platform-icons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 0.5rem 0;
        }
        .platform-icons i { font-size: 1.1rem; }
        .ps-icon { color: #0099ff; }
        .xbox-icon { color: #51ff00; }
        .game-type {
            background: #ff6a0015;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ff6a00;
            display: inline-block;
            margin-top: 0.3rem;
        }
        .game-status {
            font-size: 0.75rem;
            color: #4ade80;
            margin-top: 0.3rem;
        }
        .view-detail {
            background: #ff6a00;
            color: #000;
            text-align: center;
            padding: 0.4rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 0.8rem;
            transition: 0.2s;
        }
        .game-card:hover .view-detail {
            background: #ff8c2a;
        }
        footer { margin-top: 2rem; text-align: center; padding: 1rem; color: #888; font-size: 0.8rem; }
        .owner-id { background: #ff6a0022; display: inline-block; padding: 0.4rem 1rem; border-radius: 50px; }
        .owner-id a { color: #ff6a00; text-decoration: none; }
        @media (max-width: 650px) { .container { padding: 0.8rem; } }
    </style>
</head>
<body>

    function renderAllGames() {
        const container = document.getElementById('allGamesGrid');
        if (!container) return;
        
        container.innerHTML = gamesList.map(game => `
            <div class="game-card" onclick="alert('${game.title} - قیمت: ۱۵۰,۰۰۰ تومان\\nبرای خرید با پشتیبانی تماس بگیرید')">
                <div class="img-container">
                    <img class="game-img" src="${game.img}" alt="${game.title}" onerror="this.parentElement.innerHTML='<div style=\\'width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#1a1a2e; color:#ff6a00;\\'><i class=\\'fas fa-gamepad\\' style=\\'font-size:3rem;\\'></i></div>'">

                <div class="game-info">
                    <div class="game-title">${game.title}</div>
                    <div class="game-size"><i class="fas fa-hdd"></i> ${game.size}</div>
                    <div class="platform-icons">
                        <i class="fab fa-playstation ps-icon"></i>
                        <i class="fab fa-xbox xbox-icon"></i>
                    </div>
                    <div class="game-type">🎮 کپی خور</div>
                    <div class="game-status">✅ موجود - ۱۵۰,۰۰۰ تومان</div>
                    <div class="view-detail">👈 مشاهده جزئیات و خرید</div>
