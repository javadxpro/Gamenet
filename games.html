<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>همه بازی‌ها | فروشگاه گیم نت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', system-ui;
            background: #0a0a0f;
            color: #eef2ff;
            direction: rtl;
            padding-bottom: 75px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111118;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 1px solid #222;
            z-index: 100;
        }
        .bottom-nav a {
            text-align: center;
            color: #aaa;
            text-decoration: none;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .bottom-nav a i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #ff6a00; background: #ff6a0010; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 { font-size: 1.4rem; background: linear-gradient(135deg, #fff, #ff6a00); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .back-link { color: #ff6a00; text-decoration: none; }
        .section-title {
            font-size: 1.4rem;
            margin: 1rem 0;
            border-right: 4px solid #ff6a00;
            padding-right: 0.8rem;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: #111118;
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.2s;
        }
        .game-card:hover {
            border-color: #ff6a00;
            transform: translateY(-5px);
        }
        .game-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .game-info {
            padding: 1rem;
            text-align: center;
        }
        .game-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .game-status {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
        }
        .game-status.available {
            background: #4ade8015;
            color: #4ade80;
        }
        .game-status.unavailable {
            background: #ff444415;
            color: #ff4444;
        }
        .view-detail {
            background: #ff6a00;
            color: #000;
            text-align: center;
            padding: 0.5rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 0.8rem;
            transition: 0.2s;
            cursor: pointer;
        }
        .view-detail:hover {
            background: #ff8c2a;
        }
        footer { margin-top: 2rem; text-align: center; padding: 1rem; color: #888; font-size: 0.8rem; }
        .owner-id { background: #ff6a0022; display: inline-block; padding: 0.4rem 1rem; border-radius: 50px; }
        .owner-id a { color: #ff6a00; text-decoration: none; }
        @media (max-width: 650px) { .container { padding: 0.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="logo"><h1><i class="fas fa-store"></i> فروشگاه گیم نت</h1></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> بازگشت به صفحه اصلی</a>
    </div>

    <h2 class="section-title">📋 همه بازی‌ها</h2>
    <div class="games-grid" id="allGamesGrid"></div>

    <footer>
        <div class="owner-id"><i class="fab fa-telegram"></i> آیدی مدیریت: <a href="https://rubika.ir/javadxpro" target="_blank">javadxpro@</a></div>
        <p>فروشگاه گیم نت | تمامی حقوق محفوظ است</p>
    </footer>
</div>

<div class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i> خانه</a>
    <a href="cart.html"><i class="fas fa-shopping-cart"></i> سبد خرید</a>
    <a href="offers.html"><i class="fas fa-gift"></i> پیشنهادها</a>
    <a href="games.html" class="active"><i class="fas fa-gamepad"></i> بازی‌ها</a>
    <a href="giftcard.html"><i class="fas fa-ticket-alt"></i> گیفت کارت</a>
</div>

<script>
    // لیست همه بازی‌ها
    const allGames = [
        {
            title: "دزدان لاستیکی",
            img: "https://raw.githubusercontent.com/javadxpro/Gamenet/refs/heads/main/rubber%20bandits.jpg",
            status: "ناموجود",
            link: "#"
        },
        {
            title: "Call of Duty Modern Warfare III",
            img: "https://raw.githubusercontent.com/javadxpro/Gamenet/refs/heads/main/Call%20of%20Duty%20Modern%20Warfare%20III.jpg",
            status: "ناموجود",
            link: "#"
        },
        {
            title: "Injustice 2",
            img: "https://raw.githubusercontent.com/javadxpro/Gamenet/refs/heads/main/injustice%202.jpg",
            status: "ناموجود",
            link: "#"
        },
        {
            title: "PES 2026 - نسخه جام جهانی",
            img: "https://raw.githubusercontent.com/javadxpro/Gamenet/main/PES%20Monster%20PATCH%20WorldCup%202026.jpg",
            status: "موجود",
            link: "game1.html"
        },
        {
            title: "Call of Duty: Black Ops Cold War",
            img: "https://raw.githubusercontent.com/javadxpro/Gamenet/main/call%20of%20duty%20black%20ops%20cold%20war.jpg",
            status: "موجود",
            link: "game2.html"
        },
        {
            title: "Gang Beast",
            img: "https://raw.githubusercontent.com/javadxpro/Gamenet/main/gang%20beast.jpg",
            status: "موجود",
            link: "game3.html"
        },
        {
            title: "PES 2026 - پچ زمستانی",
            img: "https://raw.githubusercontent.com/javadxpro/Gamenet/refs/heads/main/Monster%20PATCH%20WINTER%202026.jpg",
            status: "موجود",
            link: "game4.html"
        }
    ];

    function renderAllGames() {
        const container = document.getElementById('allGamesGrid');
        if (!container) return;
        
        container.innerHTML = allGames.map(game => `
            <div class="game-card">
                <img class="game-img" src="${game.img}" alt="${game.title}">
                <div class="game-info">
                    <div class="game-title">${game.title}</div>
                    <div class="game-status ${game.status === 'موجود' ? 'available' : 'unavailable'}">
                        ${game.status === 'موجود' ? '✅ موجود' : '⛔ ناموجود'}
                    </div>
                    ${game.status === 'موجود' ? 
                        `<div class="view-detail" onclick="location.href='${game.link}'">👈 مشاهده جزئیات و خرید</div>` : 
                        `<div class="view-detail" style="background: #555; cursor: not-allowed;">⛔ ناموجود - به زودی</div>`
                    }
                </div>
            </div>
        `).join('');
    }

    renderAllGames();
</script>
</body>
</html>
