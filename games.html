<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>همه بازی‌ها | فروشگاه گیم نت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', system-ui;
            background: #0a0a0f;
            color: #eef2ff;
            direction: rtl;
            padding-bottom: 75px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111118;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 1px solid #222;
            z-index: 100;
        }
        .bottom-nav a {
            text-align: center;
            color: #aaa;
            text-decoration: none;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .bottom-nav a i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #ff6a00; background: #ff6a0010; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 { font-size: 1.4rem; background: linear-gradient(135deg, #fff, #ff6a00); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .back-link { color: #ff6a00; text-decoration: none; }
        .section-title {
            font-size: 1.4rem;
            margin: 1rem 0;
            border-right: 4px solid #ff6a00;
            padding-right: 0.8rem;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: #111118;
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.2s;
            cursor: pointer;
        }
        .game-card:hover {
            border-color: #ff6a00;
            transform: translateY(-5px);
        }
        .game-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-info {
            padding: 1rem;
            text-align: center;
        }
        .game-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
        }
        .game-size {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        .platform-icons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 0.5rem 0;
        }
        .platform-icons i { font-size: 1.1rem; }
        .ps-icon { color: #0099ff; }
        .xbox-icon { color: #51ff00; }
        .game-type {
            background: #ff6a0015;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ff6a00;
            display: inline-block;
            margin-top: 0.3rem;
        }
        .game-status {
            font-size: 0.75rem;
            color: #4ade80;
            margin-top: 0.3rem;
        }
        .view-detail {
            background: #ff6a00;
            color: #000;
            text-align: center;
            padding: 0.4rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 0.8rem;
            transition: 0.2s;
        }
        .game-card:hover .view-detail {
            background: #ff8c2a;
        }
        footer { margin-top: 2rem; text-align: center; padding: 1rem; color: #888; font-size: 0.8rem; }
        .owner-id { background: #ff6a0022; display: inline-block; padding: 0.4rem 1rem; border-radius: 50px; }
        .owner-id a { color: #ff6a00; text-decoration: none; }
        @media (max-width: 650px) { .container { padding: 0.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="logo"><h1><i class="fas fa-store"></i> فروشگاه گیم نت</h1></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> بازگشت به صفحه اصلی</a>
    </div>

    <h2 class="section-title">🎮 بازی‌های کپی خور (PS4)</h2>
    <div class="games-grid" id="allGamesGrid"></div>

    <footer>
        <div class="owner-id"><i class="fab fa-telegram"></i> آیدی مدیریت: <a href="https://rubika.ir/javadxpro" target="_blank">javadxpro@</a></div>
        <p>فروشگاه گیم نت | تمامی حقوق محفوظ است</p>
    </footer>
</div>

<div class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i> خانه</a>
    <a href="cart.html"><i class="fas fa-shopping-cart"></i> سبد خرید</a>
    <a href="offers.html"><i class="fas fa-gift"></i> پیشنهادها</a>
    <a href="games.html" class="active"><i class="fas fa-gamepad"></i> بازی‌ها</a>
    <a href="giftcard.html"><i class="fas fa-ticket-alt"></i> گیفت کارت</a>
</div>

<script>
    // لیست کامل بازی‌های کپی خور PS4
    // بازی‌های انحصاری پلی استیشن فقط آرم PS دارند
    const exclusiveGames = [
        "Marvel's Spider-Man", "Uncharted: The Lost Legacy", "The Last of Us Part 2",
        "Ghost of Tsushima", "God of War", "Horizon Zero Dawn", "Horizon Forbidden West",
        "Bloodborne", "Days Gone", "Ratchet & Clank", "Shadow of the Colossus"
    ];

    const gamesList = [
        { title: "A Way Out", size: "16.6 GB", exclusive: false },
        { title: "WATCH_DOGS® 2", size: "33 GB", exclusive: false },
        { title: "TEKKEN™7", size: "39 GB", exclusive: false },
        { title: "Marvel's Spider-Man", size: "71 GB", exclusive: true },
        { title: "Minecraft", size: "2 GB", exclusive: false },
        { title: "GTA V", size: "124 GB", exclusive: false },
        { title: "Kung Fu Panda", size: "4.3 GB", exclusive: false },
        { title: "FlatOut 4", size: "7 GB", exclusive: false },
        { title: "WRECKFEST", size: "25.5 GB", exclusive: false },
        { title: "Uncharted: The Lost Legacy", size: "46 GB", exclusive: true },
        { title: "Unravel TWO", size: "3 GB", exclusive: false },
        { title: "DEAD OR ALIVE 6", size: "62 GB", exclusive: false },
        { title: "Road Redemption", size: "5.5 GB", exclusive: false },
        { title: "Crash Team Racing Nitro-Fueled", size: "21.5 GB", exclusive: false },
        { title: "American Fugitive", size: "2 GB", exclusive: false },
        { title: "Streets of Rage 4", size: "5 GB", exclusive: false },
        { title: "WWE 2K Battlegrounds", size: "8.5 GB", exclusive: false },
        { title: "Kena: Bridge of Spirits", size: "18.5 GB", exclusive: false },
        { title: "Call of Duty Modern Warfare II", size: "168 GB", exclusive: false },
        { title: "WWE 2K23", size: "73 GB", exclusive: false },
        { title: "EA SPORTS FC 24", size: "46 GB", exclusive: false },
        { title: "EA SPORTS FC 25", size: "50 GB", exclusive: false },
        { title: "EA SPORTS FC 26", size: "85 GB", exclusive: false },
        { title: "Goat Simulator 3", size: "13 GB", exclusive: false },
        { title: "Ghost Recon Wildlands", size: "57 GB", exclusive: false },
        { title: "It Takes Two", size: "34.5 GB", exclusive: false },
        { title: "Call of Duty Black Ops 3", size: "110 GB", exclusive: false },
        { title: "Guns Gore and Cannoli 2", size: "1 GB", exclusive: false },
        { title: "METAL SLUG XX", size: "1 GB", exclusive: false },
        { title: "Call of Duty WWII", size: "80.5 GB", exclusive: false },
        { title: "The Takeover", size: "1 GB", exclusive: false }
    ];

    function renderAllGames() {
        const container = document.getElementById('allGamesGrid');
        if (!container) return;
        
        container.innerHTML = gamesList.map(game => {
            const isExclusive = game.exclusive;
            return `
                <div class="game-card" onclick="alert('${game.title} - قیمت: ۱۵۰,۰۰۰ تومان\nبرای خرید با پشتیبانی تماس بگیرید')">
                    <div class="game-img">
                        <i class="fas fa-gamepad" style="font-size: 3rem; color: #ff6a00;"></i>
                    </div>
                    <div class="game-info">
                        <div class="game-title">${game.title}</div>
                        <div class="game-size"><i class="fas fa-hdd"></i> ${game.size}</div>
                        <div class="platform-icons">
                            <i class="fab fa-playstation ps-icon"></i>
                            ${!isExclusive ? '<i class="fab fa-xbox xbox-icon"></i>' : ''}
                        </div>
                        <div class="game-type">🎮 کپی خور</div>
                        <div class="game-status">✅ موجود - ۱۵۰,۰۰۰ تومان</div>
                        <div class="view-detail">👈 مشاهده جزئیات و خرید</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    renderAllGames();
</script>
</body>
</html>
