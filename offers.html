<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیشنهادها | فروشگاه گیم نت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', system-ui;
            background: #0a0a0f;
            color: #eef2ff;
            direction: rtl;
            padding-bottom: 75px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111118;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 1px solid #222;
            z-index: 100;
        }
        .bottom-nav a {
            text-align: center;
            color: #aaa;
            text-decoration: none;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .bottom-nav a i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #ff6a00; background: #ff6a0010; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 { font-size: 1.4rem; background: linear-gradient(135deg, #fff, #ff6a00); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .back-link { color: #ff6a00; text-decoration: none; }
        .section-title {
            font-size: 1.4rem;
            margin: 1rem 0;
            border-right: 4px solid #ff6a00;
            padding-right: 0.8rem;
        }
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .offer-card {
            background: #111118;
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.2s;
            cursor: pointer;
        }
        .offer-card:hover {
            border-color: #ff6a00;
            transform: translateY(-5px);
        }
        .img-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
        }
        .offer-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .offer-info {
            padding: 1rem;
            text-align: center;
        }
        .offer-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
        }
        .offer-status {
            font-size: 0.8rem;
            font-weight: bold;
        }
        .offer-status.unavailable {
            color: #ff4444;
        }
        .blog-section {
            margin-top: 2rem;
            background: #111118;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid #333;
        }
        footer { margin-top: 2rem; text-align: center; padding: 1rem; color: #888; font-size: 0.8rem; }
        .owner-id { background: #ff6a0022; display: inline-block; padding: 0.4rem 1rem; border-radius: 50px; }
        .owner-id a { color: #ff6a00; text-decoration: none; }
        @media (max-width: 650px) { .container { padding: 0.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="logo"><h1><i class="fas fa-store"></i> فروشگاه گیم نت</h1></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> بازگشت</a>
    </div>

    <h2 class="section-title">🎮 پیشنهاد گیم نت</h2>
    <div class="offers-grid">
        <div class="offer-card" onclick="alert('Rubber Bandits - ناموجود')">
            <div class="img-container">
                <img class="offer-img" src="https://raw.githubusercontent.com/javadxpro/Gamenet/refs/heads/main/rubber%20bandits.jpg" alt="Rubber Bandits" onerror="this.parentElement.innerHTML='<div style=\\'width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#1a1a2e; color:#ff6a00;\\'><i class=\\'fas fa-gamepad\\' style=\\'font-size:3rem;\\'></i></div>'">
            </div>
            <div class="offer-info">
                <div class="offer-title">Rubber Bandits</div>
                <div class="offer-status unavailable">⛔ ناموجود</div>
            </div>
        </div>
        <div class="offer-card" onclick="alert('Injustice 2 - ناموجود')">
            <div class="img-container">
                <img class="offer-img" src="https://raw.githubusercontent.com/javadxpro/Gamenet/refs/heads/main/injustice%202.jpg" alt="Injustice 2" onerror="this.parentElement.innerHTML='<div style=\\'width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#1a1a2e; color:#ff6a00;\\'><i class=\\'fas fa-gamepad\\' style=\\'font-size:3rem;\\'></i></div>'">
            </div>
            <div class="offer-info">
                <div class="offer-title">Injustice 2</div>
                <div class="offer-status unavailable">⛔ ناموجود</div>
            </div>
        </div>
    </div>

    <div class="blog-section">
        <i class="fas fa-blog"></i> مطالب وبلاگ | گیم‌نت
    </div>

    <footer>
        <div class="owner-id"><i class="fab fa-telegram"></i> آیدی مدیریت: <a href="https://rubika.ir/javadxpro" target="_blank">javadxpro@</a></div>
        <p>فروشگاه گیم نت | تمامی حقوق محفوظ است</p>
    </footer>
</div>

<div class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i> خانه</a>
    <a href="cart.html"><i class="fas fa-shopping-cart"></i> سبد خرید</a>
    <a href="offers.html" class="active"><i class="fas fa-gift"></i> پیشنهادها</a>
    <a href="games.html"><i class="fas fa-gamepad"></i> بازی‌ها</a>
    <a href="giftcard.html"><i class="fas fa-ticket-alt"></i> گیفت کارت</a>
</div>
</body>
</html>
