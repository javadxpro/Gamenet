<script>
// ============================================================
//  محاسبه Overall
// ============================================================
function calcOverall(stats, isGK) {
    let weights;
    if (isGK) {
        weights = { 
            gkReflexes: 1.5, gkCoverage: 1.3, gkAggression: 1.0, gkPassing: 0.7,
            speed: 0.6, jump: 0.8, physical: 0.7, awareness: 1.2, teamwork: 0.6 
        };
    } else {
        weights = { 
            attacking: 1.0, defending: 0.8, shortPass: 0.9, tackling: 0.7, loftedPass: 0.7,
            shooting: 1.2, dribbling: 0.9, kickingPower: 0.8, jump: 0.5, speed: 1.1,
            acceleration: 1.0, physical: 0.7, press: 0.8, awareness: 1.0, teamwork: 1.2,
            corners: 0.4, freeKick: 0.5, penalties: 0.4, curling: 0.5, gk: 0.3
        };
    }
    let total = 0, sumWeights = 0;
    for (let key in weights) {
        total += (stats[key] || 0) * weights[key];
        sumWeights += weights[key];
    }
    return Math.round(total / sumWeights);
}

// ============================================================
//  رنگ‌ها
// ============================================================
function getColor(value) {
    if (value >= 85) return '#4ade80';
    if (value >= 75) return '#a3e635';
    if (value >= 65) return '#fbbf24';
    if (value >= 50) return '#fb923c';
    return '#f87171';
}

// ============================================================
//  نمودار راداری
// ============================================================
let chartInstances = {};

function createRadarChart(canvasId, stats, isGK) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    
    let labels, data;
    if (isGK) {
        labels = ['واکنش', 'پوشش', 'خروج', 'پاس گلر', 'سرعت', 'پرش', 'هوش'];
        data = [
            stats.gkReflexes || 0, stats.gkCoverage || 0, stats.gkAggression || 0,
            stats.gkPassing || 0, stats.speed || 0, stats.jump || 0, stats.awareness || 0
        ];
    } else {
        labels = ['حمله', 'دفاع', 'پاس', 'شوت', 'سرعت', 'تکنیک', 'هماهنگی'];
        data = [
            stats.attacking || 0, stats.defending || 0, stats.shortPass || 0,
            stats.shooting || 0, stats.speed || 0, stats.dribbling || 0,
            stats.teamwork || 0
        ];
    }
    
    if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
    
    chartInstances[canvasId] = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{
                label: 'مهارت‌ها',
                data: data,
                backgroundColor: 'rgba(255, 106, 0, 0.2)',
                borderColor: '#ff6a00',
                pointBackgroundColor: '#ff6a00',
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: '#ff6a00'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                r: {
                    angleLines: { color: 'rgba(255,255,255,0.1)' },
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    pointLabels: { color: '#aaa', font: { size: 9, family: 'Vazirmatn' } },
                    ticks: { color: '#888', backdropColor: 'transparent', font: { size: 8 }, stepSize: 20, max: 100 }
                }
            },
            plugins: { legend: { display: false } }
        }
    });
}

// ============================================================
//  رندر بازیکنان
// ============================================================
let currentFilter = 'all';

function renderPlayers(filter = 'all') {
    const container = document.getElementById('playersContainer');
    currentFilter = filter;
    
    const filtered = playersData.filter(p => {
        if (filter === 'all') return true;
        if (p.suspended) return false;
        return p.category === filter;
    });
    
    container.innerHTML = filtered.map((player, index) => {
        const isSuspended = player.suspended || false;
        const stats = player.stats;
        const isGK = player.isGK || false;
        const overall = isSuspended ? 0 : calcOverall(stats, isGK);
        const canvasId = 'radar-' + index;
        
        // ========== ۲۰ مهارت اصلی ==========
        const statList = [
            { key: 'attacking', label: 'دید هجومی' },
            { key: 'defending', label: 'دید دفاعی' },
            { key: 'shortPass', label: 'پاس کوتاه' },
            { key: 'tackling', label: 'توپ‌گیری' },
            { key: 'loftedPass', label: 'پاس بلند' },
            { key: 'shooting', label: 'شوت' },
            { key: 'dribbling', label: 'دریبل' },
            { key: 'kickingPower', label: 'قدرت شوت' },
            { key: 'jump', label: 'پرش' },
            { key: 'speed', label: 'سرعت' },
            { key: 'acceleration', label: 'شتاب' },
            { key: 'physical', label: 'فیزیک' },
            { key: 'press', label: 'پرس' },
            { key: 'awareness', label: 'هوش' },
            { key: 'teamwork', label: 'هماهنگی' },
            { key: 'corners', label: 'کرنر' },
            { key: 'freeKick', label: 'ضربه آزاد' },
            { key: 'penalties', label: 'پنالتی' },
            { key: 'curling', label: 'کات توپ' },
            { key: 'gk', label: 'دروازه‌بانی' }
        ];
        
        // ========== مهارت‌های دروازه‌بانی ==========
        const gkStats = [
            { key: 'gkReflexes', label: 'واکنش' },
            { key: 'gkCoverage', label: 'پوشش دروازه' },
            { key: 'gkAggression', label: 'خروج' },
            { key: 'gkPassing', label: 'پاس گلر' }
        ];
        
        // ========== گروه‌بندی ۴ قسمتی ==========
        const groups = [
            { title: '⚔️ حمله', items: ['attacking', 'shooting', 'dribbling', 'speed', 'acceleration'] },
            { title: '🛡️ دفاع', items: ['defending', 'tackling', 'physical', 'press', 'jump'] },
            { title: '🎯 پاس و تکنیک', items: ['shortPass', 'loftedPass', 'dribbling', 'curling', 'freeKick'] },
            { title: '🧠 ذهنی و ست‌پیس', items: ['awareness', 'teamwork', 'corners', 'penalties', 'gk'] }
        ];
        
        return `
            <div class="player-analysis-card ${isSuspended ? 'suspended' : ''}" data-player="${player.name}">
                <div class="player-header">
                    <span class="player-name" onclick="toggleRadar('${canvasId}')">
                        ${player.name} <i class="fas fa-chevron-down" style="font-size:0.6rem; color:#666;"></i>
                    </span>
                    <span class="player-pos">${player.pos}</span>
                    <span class="player-role">${player.role}</span>
                    ${player.name === 'جواد' ? '<span class="badge-captain"><i class="fas fa-crown"></i> کاپیتان</span>' : ''}
                    ${isSuspended ? '<span class="badge-suspended"><i class="fas fa-ban"></i> تعلیق</span>' : ''}
                    ${isGK && !isSuspended ? '<span class="badge-gk"><i class="fas fa-glove"></i> گلر</span>' : ''}
                </div>
                
                ${!isSuspended ? `
                    <!-- ========== ۴ گروه اصلی ========== -->
                    ${groups.map(group => `
                        <div style="margin-top:0.5rem;">
                            <div style="font-size:0.55rem; color:#ffaa00; margin-bottom:0.2rem; border-bottom:1px solid rgba(255,106,0,0.1); padding-bottom:0.1rem;">
                                ${group.title}
                            </div>
                            <div class="stats-grid">
                                ${group.items.map(key => {
                                    const label = statList.find(s => s.key === key)?.label || key;
                                    return `
                                        <div class="stat-item">
                                            <div class="stat-label">${label}</div>
                                            <div class="stat-value" style="color:${getColor(stats[key] || 0)}">${stats[key] || 0}</div>
                                            <div class="stat-bar">
                                                <div class="stat-fill" style="width:${stats[key] || 0}%; background:${getColor(stats[key] || 0)};"></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `).join('')}
                    
                    ${isGK ? `
                        <div class="gk-stats">
                            <div class="section-label"><i class="fas fa-glove"></i> توانایی‌های دروازه‌بانی</div>
                            <div class="stats-grid">
                                ${gkStats.map(s => `
                                    <div class="stat-item">
                                        <div class="stat-label">${s.label}</div>
                                        <div class="stat-value" style="color:${getColor(stats[s.key] || 0)}">${stats[s.key] || 0}</div>
                                        <div class="stat-bar">
                                            <div class="stat-fill" style="width:${stats[s.key] || 0}%; background:${getColor(stats[s.key] || 0)};"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="weak-foot">
                        <div class="section-label"><i class="fas fa-shoe-prints"></i> پای غیرتخصصی</div>
                        <div style="display:flex; justify-content:center; gap:1rem; margin-top:0.2rem; font-size:0.6rem;">
                            <span style="color:#aaa;">استفاده:</span>
                            <span style="font-weight:bold; color:#fbbf24;">${stats.weakFootUsage || 2}</span>
                            <span style="color:#aaa;">دقت:</span>
                            <span style="font-weight:bold; color:#fbbf24;">${stats.weakFootAccuracy || 2}</span>
                        </div>
                        <div class="weak-foot-dots">
                            ${[1,2,3,4,5].map(level => `
                                <div class="dot" style="background:${level <= (stats.weakFootAccuracy || 2) ? '#fbbf24' : 'rgba(255,255,255,0.1)'};"></div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="radar-container" id="radar-container-${canvasId}">
                        <canvas id="${canvasId}"></canvas>
                    </div>
                    
                    <div class="overall">
                        <span style="color:${getColor(overall)};">${overall}</span>
                        <span class="overall-label"> / 99</span>
                        <span class="overall-label" style="margin-right:0.5rem;">Overall</span>
                    </div>
                ` : `
                    <div style="text-align:center; padding:0.5rem; color:#666; font-size:0.8rem;">
                        <i class="fas fa-user-slash"></i> این بازیکن در تعلیق است
                    </div>
                `}
            </div>
        `;
    }).join('');
    
    setTimeout(() => {
        document.querySelectorAll('.player-analysis-card:not(.suspended)').forEach((card, idx) => {
            const playerName = card.dataset.player;
            const player = playersData.find(p => p.name === playerName);
            if (player && !player.suspended) {
                const canvasId = 'radar-' + idx;
                const container = document.getElementById('radar-container-' + canvasId);
                if (container && !container.dataset.created) {
                    container.dataset.created = 'true';
                    createRadarChart(canvasId, player.stats, player.isGK || false);
                }
            }
        });
    }, 100);
}

function toggleRadar(canvasId) {
    const container = document.getElementById('radar-container-' + canvasId);
    if (container) {
        container.classList.toggle('show');
        if (container.classList.contains('show') && !container.dataset.chartCreated) {
            container.dataset.chartCreated = 'true';
            const card = container.closest('.player-analysis-card');
            if (card) {
                const playerName = card.dataset.player;
                const player = playersData.find(p => p.name === playerName);
                if (player && !player.suspended) {
                    createRadarChart(canvasId, player.stats, player.isGK || false);
                }
            }
        }
    }
}

// ============================================================
//  فیلتر
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderPlayers(this.dataset.filter);
    });
});

renderPlayers('all');
</script>
