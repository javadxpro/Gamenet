<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>گیم‌نت | صفحه رسمی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link rel="stylesheet" href="Webstyle.css">
</head>
<body>

    <div id="webglCanvas"></div>

    <!-- ========== دکمه تنظیمات کیفیت ========== -->
    <div id="qualitySettings" style="position: fixed; bottom: 80px; right: 20px; z-index: 9999; background: rgba(0,0,0,0.7); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);">
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <button onclick="setQuality('high')" style="background: rgba(0,255,100,0.2); color: #4ade80; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;">🔴 کیفیت بالا</button>
            <button onclick="setQuality('medium')" style="background: rgba(255,200,0,0.2); color: #fbbf24; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;">🟡 کیفیت متوسط</button>
            <button onclick="setQuality('low')" style="background: rgba(255,0,0,0.2); color: #f87171; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;">🟢 کم مصرف</button>
        </div>
    </div>

    <!-- ========== محتوای اصلی ========== -->
    <div class="glass-container">
        <div class="hero">
            <h1>گیم‌نت</h1>
            <div class="hero-tagline"><i class="fas fa-gamepad"></i> اینجا صفحه رسمی وب گیم نت حامدی فر هست</div>
        </div>

        <div class="row-top">
            <div class="card-hours">
                <div class="hours-header">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>ساعات کاری</h3>
                        <p>⏰ ۱۰ صبح تا ۱۰ شب</p>
                    </div>
                </div>
                <a href="news.html" class="btn btn-news" onclick="burstEffectHandler(event, this)">
                    <i class="fas fa-newspaper"></i> اخبار گیم نت
                </a>
            </div>
            <div class="card-image">
                <img src="https://raw.githubusercontent.com/javadxpro/Gamenet/main/gang%20beast.jpg" alt="Gang Beast">
            </div>
        </div>

        <div class="row-middle">
            <div class="card-services">
                <div class="services-header">
                    <i class="fas fa-store"></i>
                    <div>
                        <h3>خدمات</h3>
                        <p>🎮 نصب بازی آفلاین و آنلاین PS و Xbox</p>
                    </div>
                </div>
                <div class="platform-icons">
                    <i class="fab fa-playstation ps"></i>
                    <i class="fab fa-xbox xbox"></i>
                </div>
                <a href="index.html" class="btn btn-shop" onclick="burstEffectHandler(event, this)">
                    <i class="fas fa-store"></i> ورود به فروشگاه
                </a>
            </div>
        </div>
<!-- ========== ردیف سوم: دکمه‌ها ========== -->
<div class="row-buttons">
    <a href="team.html" class="btn btn-team" onclick="burstEffectHandler(event, this)">
        <i class="fas fa-futbol"></i> تیم فوتبال
    </a>
    <a href="https://photos.app.goo.gl/fDSRKWhZyAnd1HVv5" target="_blank" class="btn btn-gallery" onclick="burstEffectHandler(event, this)">
        <i class="fas fa-images"></i> آلبوم گیم نت
    </a>
    <!-- ========== دکمه تست/بنچمارک ========== -->
    <button class="btn btn-test" onclick="toggleTestMode()">
        <i class="fas fa-microchip"></i> تست نور
    </button>
</div>

        <div class="channels-list">
            <div class="channel-item">
                <i class="fab fa-r-project"></i>
                <a href="https://rubika.ir/GAMENETJXP" target="_blank">کانال روبیکا</a>
            </div>
            <div class="channel-item">
                <i class="fas fa-users"></i>
                <a href="https://rubika.ir/joing/IGBBIDBA0WCZWZPMKJBBNANXIDBOLVUZ" target="_blank">گروه روبیکا</a>
            </div>
        </div>

        <footer>
            <i class="fas fa-crown"></i> گیم‌نت حامدی فر | ۱۰ صبح تا ۱۰ شب
        </footer>
    </div>

    <div id="fpsDisplay">
        FPS: <span id="fpsValue">0</span>
    </div>

    <script src="WebGL.js"></script>

    <script>
        // ========== تنظیمات کیفیت ==========
        let currentQuality = 'high';
        let qualityConfig = {
            high: { balls: 60, size: 12, pixelRatio: 2 },
            medium: { balls: 35, size: 10, pixelRatio: 1.5 },
            low: { balls: 20, size: 8, pixelRatio: 1 }
        };

        function setQuality(level) {
            currentQuality = level;
            const config = qualityConfig[level];
            
            // ارسال پیام به WebGL.js برای تغییر کیفیت
            window.postMessage({
                type: 'qualityChange',
                quality: level,
                config: config
            }, '*');

            // تغییر ظاهر دکمه‌ها
            document.querySelectorAll('#qualitySettings button').forEach(btn => {
                btn.style.opacity = '0.5';
            });
            event.target.style.opacity = '1';
        }

        // ========== دریافت کیفیت فعلی ==========
        window.getQuality = function() {
            return currentQuality;
        };
    </script>
</body>
</html>
