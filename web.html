<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>گیم‌نت | صفحه رسمی</title>
    
    <!-- ========== فونت وزیرمتن (آنلاین) ========== -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    
    <!-- ========== Font Awesome (آنلاین) ========== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ========== Three.js (برای WebGL) ========== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- ========== استایل اصلی ========== -->
    <link rel="stylesheet" href="Webstyle.css">
    
    <style>
        /* ========== تنظیمات نمایشگر کیفیت ========== */
        #infoDisplay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 120px;
            pointer-events: none;
            user-select: none;
        }
        #infoDisplay .row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        #infoDisplay .label { color: #888; }
        #infoDisplay .value { font-weight: bold; }
        #infoDisplay .fps { color: #4ade80; }
        #infoDisplay .quality { color: #fbbf24; }

        /* ========== دکمه‌های تنظیمات کیفیت ========== */
        #qualitySettings {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
        }
        #qualitySettings button {
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
            font-family: inherit;
        }
        #qualitySettings button:hover {
            transform: scale(1.05);
        }
        #qualitySettings button:active {
            transform: scale(0.95);
        }

        /* ========== پخش‌کننده موسیقی (سمت راست پایین، کنار نمایشگر FPS) ========== */
        #musicPlayer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 106, 0, 0.2);
            border-radius: 16px;
            padding: 10px 14px;
            min-width: 160px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        #musicPlayer .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        #musicToggle {
            background: rgba(255, 106, 0, 0.2);
            border: 2px solid #ff6a00;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #ffaa00;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #musicToggle:hover {
            background: rgba(255, 106, 0, 0.4);
            transform: scale(1.05);
        }
        .music-info {
            flex: 1;
            text-align: right;
        }
        .music-info .status {
            font-size: 0.6rem;
            color: #888;
        }
        .music-info .title {
            font-size: 0.65rem;
            color: #ffaa00;
            font-weight: bold;
        }
        #musicProgress {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 2px;
        }
        #musicProgress .fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff6a00, #ffaa00);
            border-radius: 10px;
            transition: width 0.5s;
        }

        @media (max-width: 500px) {
            #musicPlayer {
                min-width: 120px;
                padding: 6px 10px;
                bottom: 20px;
                right: 10px;
            }
            #musicToggle {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            .music-info .title {
                font-size: 0.55rem;
            }
            .music-info .status {
                font-size: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- ========== WebGL Canvas ========== -->
    <div id="webglCanvas"></div>

    <!-- ========== نمایشگر FPS + کیفیت ========== -->
    <div id="infoDisplay">
        <div class="row">
            <span class="label">FPS:</span>
            <span class="value fps" id="fpsValue">0</span>
        </div>
        <div class="row">
            <span class="label">کیفیت:</span>
            <span class="value quality" id="qualityText">بالا</span>
        </div>
    </div>

    <!-- ========== دکمه‌های تنظیمات کیفیت ========== -->
    <div id="qualitySettings">
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <button onclick="setQuality('high')" style="background: rgba(0,255,100,0.15); color: #4ade80;" id="btn-high">🔴 بالا</button>
            <button onclick="setQuality('medium')" style="background: rgba(255,200,0,0.15); color: #fbbf24;" id="btn-medium">🟡 متوسط</button>
            <button onclick="setQuality('low')" style="background: rgba(255,0,0,0.15); color: #f87171;" id="btn-low">🟢 کم مصرف</button>
        </div>
    </div>

    <!-- ========== پخش‌کننده موسیقی (سمت راست پایین، کنار نمایشگر FPS) ========== -->
    <div id="musicPlayer">
        <div class="player-row">
            <button id="musicToggle">
                <i class="fas fa-play"></i>
            </button>
            <div class="music-info">
                <div class="status">🎵 در حال پخش</div>
                <div class="title">Robert Miles - Children</div>
            </div>
        </div>
        <div id="musicProgress">
            <div class="fill" id="progressFill"></div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://raw.githubusercontent.com/javadxpro/Gamenet/main/Robert%20Miles%20Children.mp3" type="audio/mpeg">
        مرورگر شما از پخش آهنگ پشتیبانی نمی‌کند.
    </audio>

    <!-- ========== محتوای اصلی ========== -->
    <div class="glass-container">
        
        <!-- ========== هدر ========== -->
        <div class="hero">
            <h1>گیم‌نت</h1>
            <div class="hero-tagline">
                <i class="fas fa-gamepad"></i> اینجا صفحه رسمی وب گیم نت حامدی فر هست
            </div>
        </div>

        <!-- ========== ردیف اول: ساعات کاری + عکس ========== -->
        <div class="row-top">
            <div class="card-hours">
                <div class="hours-header">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>ساعات کاری</h3>
                        <p>⏰ ۱۰ صبح تا ۱۰ شب</p>
                    </div>
                </div>
                <a href="news.html" class="btn btn-news" onclick="burstEffectHandler(event, this)">
                    <i class="fas fa-newspaper"></i> اخبار گیم نت
                </a>
            </div>
            <div class="card-image">
                <img src="https://raw.githubusercontent.com/javadxpro/Gamenet/images/MWIII-S1-ANNOUNCEMENT.jpg" alt="MWIII-S1">
            </div>
        </div>

        <!-- ========== ردیف دوم: خدمات ========== -->
        <div class="row-middle">
            <div class="card-services">
                <div class="services-header">
                    <i class="fas fa-store"></i>
                    <div>
                        <h3>خدمات</h3>
                        <p>🎮 نصب بازی آفلاین و آنلاین PS و Xbox</p>
                    </div>
                </div>
                <div class="platform-icons">
                    <i class="fab fa-playstation ps"></i>
                    <i class="fab fa-xbox xbox"></i>
                </div>
                <a href="index.html" class="btn btn-shop" onclick="burstEffectHandler(event, this)">
                    <i class="fas fa-store"></i> ورود به فروشگاه
                </a>
            </div>
        </div>

        <!-- ========== ردیف سوم: دکمه‌ها ========== -->
        <div class="row-buttons">
            <a href="team.html" class="btn btn-team" onclick="burstEffectHandler(event, this)">
                <i class="fas fa-futbol"></i> تیم فوتبال
            </a>
            <a href="https://photos.app.goo.gl/fDSRKWhZyAnd1HVv5" target="_blank" class="btn btn-gallery" onclick="burstEffectHandler(event, this)">
                <i class="fas fa-images"></i> آلبوم گیم نت
            </a>
        </div>

        <!-- ========== کانال‌ها ========== -->
        <div class="channels-list">
            <div class="channel-item">
                <i class="fab fa-r-project"></i>
                <a href="https://rubika.ir/GAMENETJXP" target="_blank">کانال روبیکا</a>
            </div>
            <div class="channel-item">
                <i class="fas fa-users"></i>
                <a href="https://rubika.ir/joing/IGBBIDBA0WCZWZPMKJBBNANXIDBOLVUZ" target="_blank">گروه روبیکا</a>
            </div>
        </div>

        <!-- ========== فوتر ========== -->
        <footer>
            <i class="fas fa-crown"></i> گیم‌نت حامدی فر | ۱۰ صبح تا ۱۰ شب
        </footer>

    </div>

    <!-- ========== اسکریپت‌ها ========== -->
    <script src="script.js"></script>
    <script src="WebGL.js"></script>

    <script>
        // ========== تنظیمات کیفیت ==========
        let currentQuality = sessionStorage.getItem('quality') || 'high';
        
        const qualityNames = {
            high: '🔴 بالا',
            medium: '🟡 متوسط',
            low: '🟢 کم مصرف'
        };
        const qualityColors = {
            high: '#4ade80',
            medium: '#fbbf24',
            low: '#f87171'
        };
        
        function updateQualityDisplay() {
            const el = document.getElementById('qualityText');
            if (el) {
                el.textContent = qualityNames[currentQuality] || 'بالا';
                el.style.color = qualityColors[currentQuality] || '#fbbf24';
            }
        }
        updateQualityDisplay();
        
        document.querySelectorAll('#qualitySettings button').forEach(btn => {
            btn.style.opacity = '0.5';
        });
        const activeBtn = document.getElementById('btn-' + currentQuality);
        if (activeBtn) activeBtn.style.opacity = '1';

        function setQuality(level) {
            currentQuality = level;
            sessionStorage.setItem('quality', level);
            updateQualityDisplay();
            
            document.querySelectorAll('#qualitySettings button').forEach(btn => {
                btn.style.opacity = '0.5';
            });
            const btn = document.getElementById('btn-' + level);
            if (btn) btn.style.opacity = '1';
            
            if (window.qualityChange) {
                window.qualityChange(level);
            } else {
                window.location.href = window.location.href.split('?')[0] + '?q=' + level;
            }
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const urlQuality = urlParams.get('q');
        if (urlQuality && urlQuality !== currentQuality) {
            currentQuality = urlQuality;
            sessionStorage.setItem('quality', urlQuality);
            updateQualityDisplay();
        }

        // ============================================================
        //  کنترل موسیقی پس‌زمینه
        // ============================================================

        const audio = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggle');
        const progressFill = document.getElementById('progressFill');
        let isPlaying = false;

        audio.volume = 0.3;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                toggleBtn.innerHTML = '<i class="fas fa-play"></i>';
                toggleBtn.style.borderColor = '#ff6a00';
                toggleBtn.style.color = '#ffaa00';
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    toggleBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    toggleBtn.style.borderColor = '#4ade80';
                    toggleBtn.style.color = '#4ade80';
                    isPlaying = true;
                }).catch(() => {
                    alert('🎵 برای پخش آهنگ، روی دکمه کلیک کنید');
                });
            }
        }

        toggleBtn.addEventListener('click', toggleMusic);

        audio.addEventListener('timeupdate', function() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
            }
        });

        audio.addEventListener('ended', function() {
            audio.currentTime = 0;
            audio.play().catch(() => {});
        });

        // تلاش برای پخش خودکار
        document.addEventListener('DOMContentLoaded', function() {
            audio.play().then(() => {
                toggleBtn.innerHTML = '<i class="fas fa-pause"></i>';
                toggleBtn.style.borderColor = '#4ade80';
                toggleBtn.style.color = '#4ade80';
                isPlaying = true;
            }).catch(() => {
                console.log('⏸️ پخش خودکار نیاز به کلیک کاربر دارد');
            });
        });

        console.log('🎵 آهنگ Robert Miles - Children آماده پخش است!');
        console.log('📍 دکمه موسیقی در گوشه سمت راست پایین صفحه قرار دارد');
    </script>

</body>
</html>
